<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ChatSphere — Real-time messaging</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ChatSphere — a real-time team chat (channels, DMs, presence, typing, reactions) built with Angular, .NET SignalR and Redis. Portfolio demo by Luis Chiquito Vera.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script>
    // Dark-first: apply dark unless the user explicitly chose light.
    (function () {
      try {
        var t = localStorage.getItem('cs-theme');
        if (t !== 'light') document.documentElement.classList.add('dark');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
